<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>New Tab</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #fdf2f0 0%, #f9ede8 30%, #f5eef5 65%, #eef3f8 100%);
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(230,208,220,0.4) 0%, transparent 70%);
    top: -120px; right: -80px;
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,215,240,0.35) 0%, transparent 70%);
    bottom: -80px; left: -60px;
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 680px;
    padding: 3rem 2.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.75rem;
    position: relative;
    z-index: 1;
  }

  /* Top row: clock + weather */
  .top-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
  }

  .clock-block { display: flex; flex-direction: column; gap: 4px; }

  .time {
    font-family: 'DM Serif Display', serif;
    font-size: 72px;
    line-height: 1;
    color: #3a2d35;
    letter-spacing: -2px;
  }

  .date {
    font-size: 14px;
    font-weight: 400;
    color: #9a8890;
    letter-spacing: 0.02em;
  }

  .weather-card {
    background: rgba(255,255,255,0.55);
    border: 0.5px solid rgba(180,160,170,0.25);
    border-radius: 18px;
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 14px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    min-width: 170px;
  }

  .weather-icon { font-size: 32px; line-height: 1; }

  .weather-info { display: flex; flex-direction: column; gap: 2px; }

  .weather-temp {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    color: #3a2d35;
    line-height: 1;
  }

  .weather-desc { font-size: 12px; color: #9a8890; }
  .weather-loc { font-size: 11px; color: #c0b0b8; font-weight: 300; }

  /* Focus card */
  .focus-card {
    background: rgba(255,255,255,0.5);
    border: 0.5px solid rgba(180,160,170,0.25);
    border-radius: 18px;
    padding: 1.1rem 1.4rem;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: #b8a8b0;
    font-weight: 500;
    margin-bottom: 10px;
  }

  .focus-row { display: flex; align-items: center; gap: 10px; }

  .focus-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: #3a2d35;
  }

  .focus-input::placeholder { color: #d0c0c8; font-style: italic; }

  .pill-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 5px 16px;
    border-radius: 20px;
    border: 0.5px solid rgba(180,140,160,0.4);
    background: rgba(255,255,255,0.6);
    color: #9a7888;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .pill-btn:hover { background: rgba(255,255,255,0.9); }

  .focus-display { font-size: 15px; color: #5a4050; }
  .focus-display em {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 18px;
    color: #3a2d35;
  }

  /* Links */
  .links-card {
    background: rgba(255,255,255,0.5);
    border: 0.5px solid rgba(180,160,170,0.25);
    border-radius: 18px;
    padding: 1.1rem 1.4rem;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .links-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 8px;
  }

  .link-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    padding: 10px 8px;
    border-radius: 14px;
    border: 0.5px solid transparent;
    transition: background 0.15s, border-color 0.15s;
    text-decoration: none;
  }

  .link-item:hover {
    background: rgba(255,255,255,0.65);
    border-color: rgba(180,160,170,0.3);
  }

  .link-icon {
    width: 40px; height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 500;
    color: #fff;
    letter-spacing: 0.02em;
  }

  .link-name {
    font-size: 11px;
    color: #7a6870;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 80px;
  }

  .add-link {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    padding: 10px 8px;
    border-radius: 14px;
    border: 0.5px dashed rgba(180,160,170,0.4);
    transition: background 0.15s;
  }

  .add-link:hover { background: rgba(255,255,255,0.45); }

  .add-icon {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: rgba(255,255,255,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: #c4b0bc;
    line-height: 1;
  }

  .add-name { font-size: 11px; color: #c4b0bc; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(200,180,190,0.35);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: rgba(255,252,250,0.98);
    border: 0.5px solid rgba(180,160,170,0.3);
    border-radius: 18px;
    padding: 1.5rem 1.75rem;
    width: 300px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    box-shadow: 0 8px 40px rgba(150,120,130,0.15);
  }

  .modal-title { font-size: 14px; font-weight: 500; color: #3a2d35; }

  .modal input {
    background: rgba(245,238,242,0.8);
    border: 0.5px solid rgba(180,160,170,0.3);
    border-radius: 10px;
    padding: 8px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: #3a2d35;
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }

  .modal input:focus { border-color: rgba(180,140,160,0.6); }
  .modal input::placeholder { color: #c8b8c0; }

  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

  .btn-cancel {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 6px 16px;
    border-radius: 20px;
    border: 0.5px solid rgba(180,160,170,0.3);
    background: transparent;
    color: #9a8890;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s;
  }

  .btn-cancel:hover { background: rgba(255,255,255,0.6); }

  .btn-save {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 6px 16px;
    border-radius: 20px;
    border: none;
    background: #c4909c;
    color: #fff;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s;
  }

  .btn-save:hover { background: #b87e8a; }
</style>
</head>
<body>

<div class="container">
  <div class="top-row">
    <div class="clock-block">
      <div class="time" id="time">00:00</div>
      <div class="date" id="date">Sunday, March 15</div>
    </div>
    <div class="weather-card">
      <div class="weather-icon" id="wicon">⛅</div>
      <div class="weather-info">
        <div class="weather-temp" id="wtemp">—°C</div>
        <div class="weather-desc" id="wdesc">Loading…</div>
        <div class="weather-loc" id="wloc">Kremenchuk</div>
      </div>
    </div>
  </div>

  <div class="focus-card">
    <div class="section-label">today's focus</div>
    <div class="focus-row" id="focus-row">
      <input class="focus-input" id="focus-input" type="text" placeholder="What matters most today?" maxlength="100" />
      <button class="pill-btn" id="focus-btn">Set</button>
    </div>
  </div>

  <div class="links-card">
    <div class="section-label">quick links</div>
    <div class="links-grid" id="links-grid"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title">Add quick link</div>
    <input type="text" id="modal-name" placeholder="Name (e.g. Gmail)" />
    <input type="text" id="modal-url" placeholder="URL (e.g. https://…)" />
    <div class="modal-btns">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-save" id="modal-save">Add link</button>
    </div>
  </div>
</div>

<script>
  const DEFAULT_LINKS = [
    { name: 'Gmail', url: 'https://mail.google.com', color: '#e06060' },
    { name: 'YouTube', url: 'https://youtube.com', color: '#e05050' },
    { name: 'Calendar', url: 'https://calendar.google.com', color: '#5b8dd9' },
    { name: 'Claude', url: 'https://claude.ai', color: '#a070c0' },
    { name: 'Maps', url: 'https://maps.google.com', color: '#50a878' },
  ];

  const COLORS = ['#e06060','#5b8dd9','#a070c0','#50a878','#d4885a','#5baec0','#c070a0','#e0904a'];

  function loadLinks() {
    try { return JSON.parse(localStorage.getItem('nt_links') || 'null') || DEFAULT_LINKS; }
    catch { return DEFAULT_LINKS; }
  }

  function saveLinks(l) { try { localStorage.setItem('nt_links', JSON.stringify(l)); } catch {} }

  function initials(name) {
    return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function renderLinks() {
    const links = loadLinks();
    const grid = document.getElementById('links-grid');
    grid.innerHTML = '';
    links.forEach(l => {
      const a = document.createElement('a');
      a.className = 'link-item';
      a.href = l.url;
      a.innerHTML = `<div class="link-icon" style="background:${l.color}">${initials(l.name)}</div><div class="link-name">${l.name}</div>`;
      grid.appendChild(a);
    });
    const add = document.createElement('div');
    add.className = 'add-link';
    add.innerHTML = `<div class="add-icon">+</div><div class="add-name">Add link</div>`;
    add.addEventListener('click', () => document.getElementById('modal-overlay').classList.add('open'));
    grid.appendChild(add);
  }

  document.getElementById('modal-cancel').addEventListener('click', () => {
    document.getElementById('modal-overlay').classList.remove('open');
  });

  document.getElementById('modal-save').addEventListener('click', () => {
    const name = document.getElementById('modal-name').value.trim();
    let url = document.getElementById('modal-url').value.trim();
    if (!name || !url) return;
    if (!/^https?:\/\//.test(url)) url = 'https://' + url;
    const links = loadLinks();
    links.push({ name, url, color: COLORS[links.length % COLORS.length] });
    saveLinks(links);
    renderLinks();
    document.getElementById('modal-overlay').classList.remove('open');
  });

  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
  });

  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('time').textContent = h + ':' + m;
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('date').textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
  }

  updateClock();
  setInterval(updateClock, 10000);

  async function loadWeather() {
    try {
      const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=49.07&longitude=33.42&current_weather=true&forecast_days=1');
      const d = await res.json();
      const cw = d.current_weather;
      const temp = Math.round(cw.temperature);
      const code = cw.weathercode;
      const icons = {0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',51:'🌦',53:'🌦',55:'🌧',61:'🌧',63:'🌧',65:'🌧',71:'🌨',73:'🌨',75:'❄️',80:'🌦',81:'🌧',82:'🌧',95:'⛈',96:'⛈',99:'⛈'};
      const descs = {0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',48:'Icy fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Moderate rain',65:'Heavy rain',71:'Light snow',73:'Moderate snow',75:'Heavy snow',80:'Showers',81:'Rain showers',82:'Heavy showers',95:'Thunderstorm',96:'Hail storm',99:'Heavy hail'};
      document.getElementById('wtemp').textContent = temp + '°C';
      document.getElementById('wdesc').textContent = descs[code] || 'Partly cloudy';
      document.getElementById('wicon').textContent = icons[code] || '⛅';
    } catch {
      document.getElementById('wdesc').textContent = 'Unavailable';
    }
  }

  loadWeather();

  // Focus
  const focusInput = document.getElementById('focus-input');
  const focusBtn = document.getElementById('focus-btn');
  const focusRow = document.getElementById('focus-row');

  function showFocusDisplay(text) {
    focusRow.innerHTML = `<div class="focus-display">Focus: <em>${text}</em></div><button class="pill-btn" id="focus-clear">Clear</button>`;
    document.getElementById('focus-clear').addEventListener('click', () => {
      try { localStorage.removeItem('nt_focus'); } catch {}
      focusRow.innerHTML = `<input class="focus-input" id="focus-input" type="text" placeholder="What matters most today?" maxlength="100" /><button class="pill-btn" id="focus-btn">Set</button>`;
      document.getElementById('focus-btn').addEventListener('click', handleFocusSet);
      document.getElementById('focus-input').addEventListener('keydown', e => { if (e.key === 'Enter') handleFocusSet(); });
    });
  }

  function handleFocusSet() {
    const val = document.getElementById('focus-input').value.trim();
    if (!val) return;
    try { localStorage.setItem('nt_focus', val); } catch {}
    showFocusDisplay(val);
  }

  focusBtn.addEventListener('click', handleFocusSet);
  focusInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleFocusSet(); });

  try {
    const saved = localStorage.getItem('nt_focus');
    if (saved) showFocusDisplay(saved);
  } catch {}

  renderLinks();
</script>
</body>
</html>
